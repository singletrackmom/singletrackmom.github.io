<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARC Student Support &amp; Success Kickoff</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;1,9..40,400&display=swap" rel="stylesheet">
<style>

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #FAFAF7;
  --ink: #1C1A18;
  --muted: #7A7770;
  --border: #E4DDD5;
  --surface: #F3F0EA;
  --green: #2D6A4F;
  --green-mid: #52B788;
  --green-light: #D8F3DC;
  --green-pale: #EDF7EE;
  --radius: 8px;
}

body {
  font-family: 'DM Sans', sans-serif;
  background: var(--bg);
  color: var(--ink);
  min-height: 100vh;
  font-size: 15px;
}

.container {
  max-width: 920px;
  margin: 0 auto;
  padding: 40px 24px 80px;
}

.page-header { text-align: center; margin-bottom: 44px; }

.page-header h1 {
  font-family: 'DM Serif Display', serif;
  font-size: clamp(24px, 4.5vw, 40px);
  font-weight: 400;
  line-height: 1.2;
  margin-bottom: 10px;
}

.page-header h1 em { font-style: italic; color: var(--green); }
.instruction { font-size: 16px; color: var(--ink); font-weight: 400; margin-top: 6px; }
.subtitle { color: var(--muted); font-size: 15px; font-weight: 300; }

.pill-divider {
  width: 40px; height: 2px;
  background: var(--green-light);
  margin: 20px auto 0;
  border-radius: 2px;
}

.section { margin-bottom: 36px; }

.section-label {
  font-size: 11px;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: var(--muted);
  margin-bottom: 14px;
}

.name-pills { display: flex; flex-wrap: wrap; gap: 8px; }

.pill {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 8px 18px;
  border-radius: 40px;
  border: 1.5px solid var(--border);
  background: white;
  color: var(--ink);
  cursor: pointer;
  transition: all 0.15s;
}

.pill:hover { border-color: var(--green); color: var(--green); background: var(--green-pale); }
.pill--active { background: var(--green) !important; color: white !important; border-color: var(--green) !important; }

.prompt {
  text-align: center;
  padding: 48px 20px;
  color: var(--muted);
  font-size: 16px;
  font-style: italic;
  background: white;
  border: 1.5px dashed var(--border);
  border-radius: var(--radius);
}

.tabs {
  display: flex;
  background: var(--surface);
  border-radius: var(--radius);
  padding: 4px;
  margin-bottom: 24px;
  width: fit-content;
}

.tab {
  font-family: 'DM Sans', sans-serif;
  font-size: 14px;
  font-weight: 500;
  padding: 9px 22px;
  border: none;
  border-radius: calc(var(--radius) - 2px);
  cursor: pointer;
  color: var(--muted);
  background: transparent;
  transition: all 0.15s;
}

.tab:hover:not(.tab--active) { color: var(--ink); background: rgba(255,255,255,0.5); }
.tab--active { background: white; color: var(--green); font-weight: 600; box-shadow: 0 1px 4px rgba(0,0,0,0.1); }

.grid-wrap {
  overflow-x: auto;
  border: 1.5px solid var(--border);
  border-radius: var(--radius);
  background: white;
  box-shadow: 0 2px 12px rgba(28,26,24,0.06);
}

.grid {
  display: grid;
  grid-template-columns: 82px repeat(5, 1fr);
  min-width: 580px;
  user-select: none;
}

.grid-corner {
  border-bottom: 1.5px solid var(--border);
  border-right: 1.5px solid var(--border);
  background: var(--surface);
  min-height: 64px;
}

.grid-date-header {
  border-bottom: 1.5px solid var(--border);
  border-right: 1px solid var(--border);
  padding: 12px 8px 10px;
  text-align: center;
  background: var(--surface);
  display: flex;
  flex-direction: column;
  align-items: center;
  gap: 2px;
}

.grid-date-header:last-child { border-right: none; }

.dow { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.08em; color: var(--muted); }
.datenum { font-family: 'DM Serif Display', serif; font-size: 20px; font-weight: 400; line-height: 1.1; }
.monthabbr { font-size: 10px; color: var(--muted); }

.grid-time-label {
  display: flex;
  align-items: center;
  justify-content: flex-end;
  padding: 0 10px 0 4px;
  font-size: 11px;
  color: var(--muted);
  border-right: 1.5px solid var(--border);
  border-bottom: 1px solid #EEECE7;
  background: white;
  min-height: 52px;
  white-space: nowrap;
}

.cell {
  min-height: 52px;
  border-right: 1px solid #EEECE7;
  border-bottom: 1px solid #EEECE7;
  transition: background 0.08s;
  cursor: pointer;
  position: relative;
}

.cell--my:hover:not(.cell--selected) { background: var(--green-pale); }
.cell--selected { background: var(--green) !important; }

.cell--selected::after {
  content: '✓';
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  color: rgba(255,255,255,0.85);
  font-size: 14px;
  font-weight: 500;
}

.cell--heat { cursor: default; }
.cell--heat:hover { filter: brightness(0.93); }

.save-section {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 20px;
  flex-wrap: wrap;
}

.save-status { font-size: 14px; color: var(--muted); font-style: italic; flex: 1; min-width: 160px; }
.save-status.has-selections { color: var(--green); font-style: normal; font-weight: 500; }

.btn-save {
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  font-weight: 500;
  padding: 12px 28px;
  background: var(--green);
  color: white;
  border: none;
  border-radius: var(--radius);
  cursor: pointer;
  transition: all 0.18s;
  white-space: nowrap;
}

.btn-save:hover { background: #1E5C3D; transform: translateY(-1px); box-shadow: 0 4px 14px rgba(45,106,79,0.3); }
.btn-save:disabled { opacity: 0.6; cursor: not-allowed; transform: none; box-shadow: none; }
.btn-save.saved { background: var(--green-mid); }
.btn-save.errored { background: #C0392B; }

.saved-row {
  display: flex;
  align-items: center;
  gap: 16px;
  margin-top: 10px;
  width: 100%;
  flex-wrap: wrap;
}

.saved-note { font-size: 12px; color: var(--green); }

.btn-clear {
  font-family: 'DM Sans', sans-serif;
  font-size: 12px;
  font-weight: 500;
  padding: 5px 14px;
  background: transparent;
  color: var(--muted);
  border: 1.5px solid var(--border);
  border-radius: 20px;
  cursor: pointer;
  transition: all 0.15s;
  white-space: nowrap;
}

.btn-clear:hover { border-color: #C0392B; color: #C0392B; background: #FFF5F5; }

.legend-section { margin-top: 20px; display: flex; flex-direction: column; gap: 10px; }
.legend-bar-wrap { display: flex; align-items: center; gap: 12px; }
.legend-label { font-size: 12px; color: var(--muted); white-space: nowrap; }
.legend-bar {
  height: 14px; flex: 1; border-radius: 7px;
  background: linear-gradient(to right, #F3F4F2, var(--green-light) 30%, #52B788 65%, #2D6A4F);
  border: 1px solid var(--border);
}

.legend-hint { font-size: 13px; color: var(--muted); font-style: italic; }
.responded-section { font-size: 13px; color: var(--muted); }
.responded-section strong { color: var(--ink); font-weight: 500; }

.respondent-chip {
  display: inline-flex; align-items: center; gap: 5px;
  background: var(--green-pale); border: 1px solid var(--green-light);
  color: var(--green); border-radius: 20px;
  padding: 3px 10px; font-size: 12px; font-weight: 500;
  margin: 3px 3px 0 0;
}

.respondent-dot { width: 6px; height: 6px; background: var(--green-mid); border-radius: 50%; }

.waiting-badge {
  display: inline-flex; align-items: center; gap: 6px;
  background: #FFF8F0; border: 1px solid #F3D5B5;
  color: #9A5B13; border-radius: 20px;
  padding: 3px 10px; font-size: 12px; margin: 3px 3px 0 0;
}

.tooltip {
  position: fixed;
  background: #1C1A18;
  color: white;
  padding: 8px 12px;
  border-radius: 6px;
  font-size: 13px;
  line-height: 1.6;
  pointer-events: none;
  z-index: 1000;
  max-width: 240px;
  box-shadow: 0 4px 16px rgba(0,0,0,0.2);
  display: none;
}

.tooltip strong { display: block; font-weight: 600; margin-bottom: 2px; font-size: 12px; }
.tip-names { color: #D8F3DC; font-size: 12px; }
.tip-none { color: #999; font-style: italic; }

.loading-state {
  display: flex; align-items: center; gap: 12px;
  color: var(--muted); font-size: 14px; padding: 20px 0;
}

.spinner {
  width: 18px; height: 18px;
  border: 2px solid var(--border);
  border-top-color: var(--green);
  border-radius: 50%;
  animation: spin 0.7s linear infinite;
  flex-shrink: 0;
}

@keyframes spin { to { transform: rotate(360deg); } }

.error-banner {
  background: #FFF0F0; border: 1px solid #F5C6C6;
  color: #C0392B; border-radius: var(--radius);
  padding: 12px 16px; font-size: 14px; margin-bottom: 16px;
  line-height: 1.5;
}

.confirm-dialog {
  background: white;
  border: 1.5px solid #F5C6C6;
  border-radius: var(--radius);
  padding: 14px 18px;
  margin-top: 10px;
  font-size: 14px;
  display: flex;
  align-items: center;
  gap: 12px;
  flex-wrap: wrap;
}

.confirm-dialog span { flex: 1; color: var(--ink); }

.btn-confirm-clear {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 7px 16px;
  background: #C0392B; color: white;
  border: none; border-radius: 6px; cursor: pointer;
}

.btn-confirm-clear:hover { background: #96281B; }

.btn-cancel-clear {
  font-family: 'DM Sans', sans-serif;
  font-size: 13px; font-weight: 500;
  padding: 7px 16px;
  background: var(--surface); color: var(--muted);
  border: 1.5px solid var(--border); border-radius: 6px; cursor: pointer;
}

.btn-cancel-clear:hover { color: var(--ink); border-color: var(--ink); }

</style>
</head>
<body>

<div class="container">
  <div class="page-header">
    <h1>ARC Student Support<br>&amp; <em>Success Kickoff</em></h1>
    <p class="instruction">Please select times you can meet.</p>
    <p class="subtitle">April 20–24, 2026 &nbsp;·&nbsp; 1-hour blocks</p>
    <div class="pill-divider"></div>
  </div>

  <div class="section">
    <div class="section-label">Who are you?</div>
    <div class="name-pills" id="name-pills"></div>
  </div>

  <div id="main-area">
    <div class="prompt">Click your name above to mark your availability.</div>
  </div>
</div>

<div class="tooltip" id="tooltip"></div>

<script>

const SHEET_URL = 'https://script.google.com/macros/s/AKfycbzjT8l_d0xAYKMhys02REyMs8qld6PF4fjvfsnCHNBQUOM_dNFZDkBG9JehXloUzBQBkA/exec';

const PEOPLE = ['Ralph','Christina','Pattie','Maryellen','Noelle','Vanessa','Stephanie','Michelle'];

const DATE_LABELS = [
  { dow: 'Mon', date: 'Apr 20' },
  { dow: 'Tue', date: 'Apr 21' },
  { dow: 'Wed', date: 'Apr 22' },
  { dow: 'Thu', date: 'Apr 23' },
  { dow: 'Fri', date: 'Apr 24' },
];

const HOUR_LABELS = ['9:00 AM','10:00 AM','11:00 AM','12:00 PM','1:00 PM','2:00 PM','3:00 PM','4:00 PM'];

// ---- STATE ----

let currentUser = null;
let activeTab = 'mine';
let allResponses = {};
let mySelections = {};
let isDragging = false;
let dragMode = null;
let isSaving = false;
let jsonpCounter = 0;

// ---- JSONP ----

function jsonpFetch(params, timeoutMs = 10000) {
  return new Promise((resolve, reject) => {
    const cbName = `__arc_cb_${++jsonpCounter}`;
    const url = new URL(SHEET_URL);
    Object.entries(params).forEach(([k, v]) => url.searchParams.set(k, v));
    url.searchParams.set('callback', cbName);
    const script = document.createElement('script');
    script.src = url.toString();
    const timer = setTimeout(() => { cleanup(); reject(new Error('Timed out')); }, timeoutMs);
    function cleanup() {
      clearTimeout(timer);
      delete window[cbName];
      if (script.parentNode) script.parentNode.removeChild(script);
    }
    window[cbName] = (data) => { cleanup(); resolve(data); };
    script.onerror = () => { cleanup(); reject(new Error('Failed to load')); };
    document.head.appendChild(script);
  });
}

async function loadData() {
  try { return await jsonpFetch({ action: 'load' }); }
  catch (e) { console.error('Load error:', e); return null; }
}

async function saveToSheet(name, selectedKeys) {
  try {
    const result = await jsonpFetch({ action: 'save', name, slots: selectedKeys.join(',') });
    return result?.success === true;
  } catch (e) { console.error('Save error:', e); return false; }
}

// Only people with a row in the sheet (i.e. who have actually saved) count as responded.
// The sheet now only creates rows on save — no pre-population.
function hasResponded(name) {
  return allResponses[name] !== undefined;
}

function ck(di, hi) { return `${di}-${hi}`; }

function heatColor(level) {
  if (level === 0) return '#F3F4F2';
  return `rgb(${Math.round(216+level*(27-216))},${Math.round(243+level*(67-243))},${Math.round(220+level*(50-220))})`;
}

// ---- RENDER ----

function renderNamePills() {
  const c = document.getElementById('name-pills');
  c.innerHTML = PEOPLE.map(n =>
    `<button class="pill${currentUser===n?' pill--active':''}" data-name="${n}">${n}</button>`
  ).join('');
  c.querySelectorAll('.pill').forEach(btn =>
    btn.addEventListener('click', () => selectUser(btn.dataset.name))
  );
}

function setMain(html) { document.getElementById('main-area').innerHTML = html; }

function renderMain() {
  if (!currentUser) {
    setMain(`<div class="prompt">Click your name above to mark your availability.</div>`);
    return;
  }
  setMain(`
    <div class="tabs">
      <button class="tab${activeTab==='mine'?' tab--active':''}" id="tab-mine">My Availability</button>
      <button class="tab${activeTab==='group'?' tab--active':''}" id="tab-group">Group Overview</button>
    </div>
    <div id="error-area"></div>
    <div id="grid-area">${activeTab==='mine' ? buildMyGrid() : buildGroupGrid()}</div>
    <div id="bottom-area">${activeTab==='mine' ? buildSaveSection() : buildLegend()}</div>
  `);
  document.getElementById('tab-mine').addEventListener('click', () => {
    if (activeTab !== 'mine') { activeTab = 'mine'; renderMain(); }
  });
  document.getElementById('tab-group').addEventListener('click', () => {
    if (activeTab !== 'group') { activeTab = 'group'; renderMain(); }
  });
  attachEvents();
}

// ---- GRID ----

function buildGrid(cellFn) {
  let h = `<div class="grid-wrap"><div class="grid"><div class="grid-corner"></div>`;
  DATE_LABELS.forEach(d =>
    h += `<div class="grid-date-header">
      <span class="dow">${d.dow}</span>
      <span class="datenum">${d.date.split(' ')[1]}</span>
      <span class="monthabbr">${d.date.split(' ')[0]}</span>
    </div>`
  );
  HOUR_LABELS.forEach((label, hi) => {
    h += `<div class="grid-time-label">${label}</div>`;
    DATE_LABELS.forEach((_, di) => { h += cellFn(di, hi); });
  });
  return h + `</div></div>`;
}

function buildMyGrid() {
  return buildGrid((di, hi) => {
    const key = ck(di, hi);
    return `<div class="cell cell--my${mySelections[key]?' cell--selected':''}" data-di="${di}" data-hi="${hi}"></div>`;
  });
}

function buildGroupGrid() {
  const responded = PEOPLE.filter(n => hasResponded(n));
  const rc = responded.length;
  return buildGrid((di, hi) => {
    const key = ck(di, hi);
    const avail = responded.filter(n => allResponses[n][key]);
    const count = avail.length;
    const level = rc > 0 ? count / rc : 0;
    const bg = heatColor(level);
    const textColor = level > 0.55 ? 'rgba(255,255,255,0.9)' : '#7A7770';
    const label = rc > 0 && count > 0 ? `${count}/${rc}` : '';
    return `<div class="cell cell--heat"
      style="background:${bg};color:${textColor};font-size:11px;font-weight:600;display:flex;align-items:center;justify-content:center;"
      data-di="${di}" data-hi="${hi}" data-avail="${avail.join(',')}" data-count="${count}" data-responded="${rc}"
    >${label}</div>`;
  });
}

// ---- BOTTOM SECTIONS ----

function buildSaveSection() {
  const count = Object.values(mySelections).filter(Boolean).length;
  const responded = hasResponded(currentUser);
  return `
    <div class="save-section">
      <div class="save-status${count>0?' has-selections':''}">
        ${count > 0 ? `${count} slot${count!==1?'s':''} selected` : "Select the times you're available above"}
      </div>
      <button class="btn-save" id="save-btn">Save My Availability</button>
    </div>
    ${responded ? `
      <div class="saved-row">
        <span class="saved-note">✓ Response saved — saving again will update your row in the sheet.</span>
        <button class="btn-clear" id="clear-btn">Clear my response</button>
      </div>
      <div id="confirm-area"></div>
    ` : `<div id="confirm-area"></div>`}
  `;
}

function buildLegend() {
  const responded = PEOPLE.filter(n => hasResponded(n));
  const waiting = PEOPLE.filter(n => !hasResponded(n));
  return `
    <div class="legend-section">
      <div class="legend-bar-wrap">
        <span class="legend-label">0</span>
        <div class="legend-bar"></div>
        <span class="legend-label">All ${responded.length > 0 ? `(${responded.length})` : ''}</span>
      </div>
      <p class="legend-hint">Hover over any cell to see who's available at that time.</p>
      ${responded.length > 0
        ? `<div class="responded-section"><strong>Responded:</strong><br>
           ${responded.map(n => `<span class="respondent-chip"><span class="respondent-dot"></span>${n}</span>`).join('')}</div>`
        : `<div class="responded-section" style="font-style:italic">No responses yet.</div>`}
      ${waiting.length > 0
        ? `<div class="responded-section" style="margin-top:8px"><strong>Still waiting on:</strong><br>
           ${waiting.map(n => `<span class="waiting-badge">⏳ ${n}</span>`).join('')}</div>`
        : `<div class="responded-section" style="color:var(--green);font-weight:500;margin-top:8px">✓ Everyone has responded!</div>`}
    </div>
  `;
}

// ---- EVENTS ----

function attachEvents() {
  if (activeTab === 'mine') {
    document.querySelectorAll('.cell--my').forEach(cell => {
      cell.addEventListener('mousedown', e => {
        e.preventDefault();
        isDragging = true;
        const key = ck(cell.dataset.di, cell.dataset.hi);
        dragMode = mySelections[key] ? 'remove' : 'add';
        applyDrag(cell, key);
        refreshStatus();
      });
      cell.addEventListener('mouseenter', () => {
        if (!isDragging) return;
        applyDrag(cell, ck(cell.dataset.di, cell.dataset.hi));
        refreshStatus();
      });
    });
    document.getElementById('save-btn')?.addEventListener('click', handleSave);
    document.getElementById('clear-btn')?.addEventListener('click', handleClearClick);
  } else {
    const tip = document.getElementById('tooltip');
    document.querySelectorAll('.cell--heat').forEach(cell => {
      cell.addEventListener('mouseenter', e => {
        const count = parseInt(cell.dataset.count);
        const responded = parseInt(cell.dataset.responded);
        const avail = cell.dataset.avail ? cell.dataset.avail.split(',').filter(Boolean) : [];
        const di = parseInt(cell.dataset.di);
        const hi = parseInt(cell.dataset.hi);
        const d = `${DATE_LABELS[di].dow} ${DATE_LABELS[di].date}`;
        const t = `${HOUR_LABELS[hi]}–${hi < HOUR_LABELS.length-1 ? HOUR_LABELS[hi+1] : '5:00 PM'}`;
        if (responded === 0) tip.innerHTML = `<span class="tip-none">No responses yet.</span>`;
        else if (count === 0) tip.innerHTML = `<strong>${d} · ${t}</strong><span class="tip-none">Nobody available</span>`;
        else tip.innerHTML = `<strong>${d} · ${t}</strong><span class="tip-names">${count} of ${responded}: ${avail.join(', ')}</span>`;
        tip.style.display = 'block';
        moveTip(e);
      });
      cell.addEventListener('mousemove', moveTip);
      cell.addEventListener('mouseleave', () => { tip.style.display = 'none'; });
    });
  }
}

function applyDrag(cell, key) {
  if (dragMode === 'add') { mySelections[key] = true; cell.classList.add('cell--selected'); }
  else { delete mySelections[key]; cell.classList.remove('cell--selected'); }
}

function refreshStatus() {
  const el = document.querySelector('.save-status');
  if (!el) return;
  const count = Object.values(mySelections).filter(Boolean).length;
  el.textContent = count > 0 ? `${count} slot${count!==1?'s':''} selected` : "Select the times you're available above";
  el.className = 'save-status' + (count > 0 ? ' has-selections' : '');
}

function moveTip(e) {
  const t = document.getElementById('tooltip');
  if (t) { t.style.left = Math.min(e.clientX+14, window.innerWidth-260)+'px'; t.style.top=(e.clientY-10)+'px'; }
}

document.addEventListener('mouseup', () => { isDragging = false; });

// ---- SAVE ----

async function handleSave() {
  isSaving = true;
  const btn = document.getElementById('save-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Saving to sheet...'; }
  const selectedKeys = Object.entries(mySelections).filter(([,v])=>v).map(([k])=>k);
  const ok = await saveToSheet(currentUser, selectedKeys);
  isSaving = false;
  if (ok) {
    const fresh = await loadData();
    if (fresh) allResponses = fresh;
    if (btn) { btn.textContent = 'Saved ✓'; btn.classList.add('saved'); }
    setTimeout(() => renderMain(), 1200);
  } else {
    if (btn) { btn.textContent = 'Save failed — try again'; btn.disabled = false; btn.classList.add('errored'); }
    const errArea = document.getElementById('error-area');
    if (errArea) errArea.innerHTML = `<div class="error-banner">Could not reach the Google Sheet. Try again in a moment.</div>`;
  }
}

// ---- CLEAR ----

function handleClearClick() {
  const ca = document.getElementById('confirm-area');
  if (!ca) return;
  ca.innerHTML = `
    <div class="confirm-dialog">
      <span>This will remove all your selections from the sheet. Good for undoing a test. Are you sure?</span>
      <button class="btn-cancel-clear" id="cancel-clear-btn">Cancel</button>
      <button class="btn-confirm-clear" id="confirm-clear-btn">Yes, clear it</button>
    </div>
  `;
  document.getElementById('cancel-clear-btn').addEventListener('click', () => { ca.innerHTML = ''; });
  document.getElementById('confirm-clear-btn').addEventListener('click', handleConfirmClear);
}

async function handleConfirmClear() {
  const btn = document.getElementById('confirm-clear-btn');
  if (btn) { btn.disabled = true; btn.textContent = 'Clearing...'; }
  const ok = await saveToSheet(currentUser, []);
  if (ok) {
    const fresh = await loadData();
    if (fresh) allResponses = fresh;
    // Remove from local state so they no longer show as responded
    delete allResponses[currentUser];
    mySelections = {};
    renderMain();
  } else {
    if (btn) { btn.textContent = 'Failed — try again'; btn.disabled = false; }
  }
}

// ---- SELECT USER ----

async function selectUser(name) {
  currentUser = name;
  mySelections = {};
  activeTab = 'mine';
  renderNamePills();
  setMain(`<div class="loading-state"><div class="spinner"></div>Loading from sheet...</div>`);
  const data = await loadData();
  if (data === null) {
    setMain(`<div class="error-banner">Could not connect to the Google Sheet. Make sure the Apps Script is deployed with <strong>Anyone</strong> access, then refresh and try again.</div>`);
    return;
  }
  allResponses = data;
  if (allResponses[name]) {
    mySelections = Object.fromEntries(
      Object.entries(allResponses[name])
        .filter(([k, v]) => k !== '_hasResponded' && v === true)
    );
  }
  renderMain();
}

// ---- INIT ----

renderNamePills();
