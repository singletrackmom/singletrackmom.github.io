<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 80 80" width="80" height="80">
  <!-- Body -->
  <rect x="8" y="28" width="64" height="40" rx="6" fill="#1A1A1A"/>
  <!-- Top bump / viewfinder housing -->
  <rect x="24" y="18" width="28" height="14" rx="4" fill="#1A1A1A"/>
  <!-- Lens outer ring -->
  <circle cx="40" cy="50" r="16" fill="#3A3A3A"/>
  <!-- Lens mid ring -->
  <circle cx="40" cy="50" r="12" fill="#A8202D"/>
  <!-- Lens inner -->
  <circle cx="40" cy="50" r="7" fill="#1A1A1A"/>
  <!-- Lens shine -->
  <circle cx="36" cy="46" r="2.5" fill="#FFFFFF" opacity="0.5"/>
  <!-- Flash / shutter button -->
  <rect x="54" y="32" width="10" height="6" rx="2" fill="#A8202D"/>
  <!-- Viewfinder window -->
  <rect x="26" y="21" width="10" height="7" rx="2" fill="#3A3A3A"/>
  <!-- Strap lugs -->
  <rect x="8" y="34" width="4" height="8" rx="2" fill="#3A3A3A"/>
  <rect x="68" y="34" width="4" height="8" rx="2" fill="#3A3A3A"/>
</svg>
