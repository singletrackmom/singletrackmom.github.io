<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AVC 183 — Digital Graphic Design 1 · GCC</title>
<link href="https://fonts.googleapis.com/css2?family=Lora:ital,wght@0,400;0,600;1,400&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --ink:          #2e3a30;
  --paper:        #f7faf7;
  --warm:         #edf3ed;
  --stone:        #cdd8ce;
  --rule:         #c3d1c5;
  --muted:        #6e7e70;
  --green:        #4a7c59;
  --green-light:  #6b9a75;
  --green-pale:   #e2f0e4;
  --green-dark:   #3a6348;
  --gold:         #b8956a;
  --gold-pale:    #fdf3e7;
}

html { height: 100%; }
body {
  min-height: 100vh;
  background: var(--paper);
  color: var(--ink);
  font-family: 'DM Sans', sans-serif;
  font-size: 15px;
  display: flex;
  flex-direction: column;
}

.botanical-bg {
  position: fixed;
  inset: 0;
  pointer-events: none;
  z-index: 0;
  overflow: hidden;
}

header {
  background: var(--warm);
  border-bottom: 3px solid var(--gold);
  padding: 2rem 2rem 1.75rem;
  text-align: center;
  position: relative;
  overflow: hidden;
  z-index: 1;
}
header::after {
  content: '';
  position: absolute;
  bottom: -4px; left: 0; right: 0;
  height: 1px;
  background: linear-gradient(90deg, var(--gold), var(--green), var(--green-light));
  opacity: 0.35;
}
.header-botanical {
  position: absolute;
  top: 0; left: 0; right: 0; bottom: 0;
  pointer-events: none;
  opacity: 0.07;
}
.course-eyebrow {
  font-size: 0.7rem;
  font-weight: 600;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  color: var(--muted);
  margin-bottom: 0.35rem;
  position: relative;
}
.wordmark {
  font-family: 'Lora', Georgia, serif;
  font-weight: 600;
  font-size: clamp(1.3rem, 3vw, 1.8rem);
  color: var(--gold);
  line-height: 1.2;
  margin-bottom: 0.3rem;
  position: relative;
}
.wordmark em { color: var(--green-light); font-style: italic; font-weight: 400; }
.tagline {
  font-size: 0.78rem;
  color: var(--muted);
  letter-spacing: 0.08em;
  text-transform: uppercase;
  position: relative;
}
header nav {
  margin-top: 1rem;
  display: flex;
  gap: 0.5rem;
  justify-content: center;
  flex-wrap: wrap;
}
header nav a {
  color: var(--green);
  font-size: 0.78rem;
  font-weight: 600;
  text-decoration: none;
  padding: 0.28rem 0.8rem;
  border: 1px solid var(--green);
  border-radius: 2rem;
  background: white;
  transition: all 0.15s;
}
header nav a:hover { background: var(--green); color: white; }

main {
  flex: 1;
  max-width: 720px;
  width: 100%;
  margin: 0 auto;
  padding: 4rem 2rem 6rem;
  position: relative;
  z-index: 1;
  text-align: center;
}

.placeholder-icon {
  font-size: 3rem;
  margin-bottom: 1.5rem;
  opacity: 0.5;
}

main h2 {
  font-family: 'Lora', Georgia, serif;
  font-size: 1.3rem;
  font-weight: 600;
  color: var(--gold);
  margin-bottom: 1rem;
}

main p {
  font-size: 0.9rem;
  color: var(--muted);
  line-height: 1.7;
  max-width: 480px;
  margin: 0 auto;
}

.status-badge {
  display: inline-flex;
  align-items: center;
  gap: 0.3rem;
  font-size: 0.72rem;
  font-weight: 600;
  padding: 0.3rem 0.8rem;
  border-radius: 2rem;
  background: var(--gold-pale);
  color: var(--gold);
  border: 1px solid rgba(184,149,106,0.25);
  margin-top: 1.5rem;
}

footer {
  text-align: center;
  padding: 1.5rem;
  border-top: 1px solid var(--rule);
  font-size: 0.72rem;
  color: var(--muted);
  letter-spacing: 0.04em;
  position: relative;
  z-index: 1;
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(14px); }
  to   { opacity: 1; transform: translateY(0); }
}
header { animation: fadeUp 0.4s ease both; }
main   { animation: fadeUp 0.4s 0.15s ease both; }
</style>
</head>
<body>

<div class="botanical-bg" aria-hidden="true">
<svg width="100%" height="100%" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
  <defs><style>
    .v  { fill:none; stroke:#4a7c59; stroke-width:1.2; opacity:0.08; }
    .lf { fill:#6b9a75; opacity:0.06; }
  </style></defs>
  <path class="v" d="M-10,900 C50,800 30,700 70,580 C110,460 70,360 110,240 C150,120 130,60 170,0"/>
  <ellipse class="lf" cx="72"  cy="560" rx="22" ry="9"  transform="rotate(-35,72,560)"/>
  <ellipse class="lf" cx="108" cy="430" rx="18" ry="8"  transform="rotate(25,108,430)"/>
</svg>
</div>

<header>
  <svg class="header-botanical" viewBox="0 0 1200 180" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice">
    <path fill="none" stroke="#4a7c59" stroke-width="1.5" d="M0,140 C100,110 200,130 300,90 C400,50 500,70 600,40 C700,10 800,50 900,30 C1000,10 1100,50 1200,30"/>
    <ellipse fill="#6b9a75" cx="300" cy="90" rx="20" ry="9" transform="rotate(-30,300,90)"/>
    <ellipse fill="#6b9a75" cx="600" cy="40" rx="18" ry="8" transform="rotate(20,600,40)"/>
    <circle fill="#8aad8d" cx="450" cy="60" r="6" opacity="0.5"/>
  </svg>
  <div class="course-eyebrow">AVC 183 &nbsp;·&nbsp; In Development</div>
  <div class="wordmark">Digital <em>Graphic Design 1</em></div>
  <p class="tagline">Digital Media Arts</p>
  <nav>
    <a href="/canvas/">← Canvas Courses</a>
    <a href="/">Home</a>
  </nav>
</header>

<main>
  <div class="placeholder-icon">🎨</div>
  <h2>Course In Development</h2>
  <p>Content will be migrated and adapted from AVC 181 Graphic Design I. Check back as the course takes shape.</p>
  <span class="status-badge">In Development</span>
</main>

<footer>
  AVC 183 — Digital Graphic Design 1 &nbsp;·&nbsp; Michelle B.
</footer>

</body>
</html>
